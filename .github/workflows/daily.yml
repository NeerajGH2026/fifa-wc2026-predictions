name: Daily WC2026 Predictions

on:
  schedule:
    - cron: '0 14 * * *'   # 9 AM CST = 14:00 UTC  (fetch data)
    - cron: '0 15 * * *'   # 10 AM CST = 15:00 UTC (send email)
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'both'

jobs:
  fetch-data:
    if: github.event_name == 'schedule' && github.event.schedule == '0 14 * * *' || github.event.inputs.job == 'fetch' || github.event.inputs.job == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

- name: Fetch scores & fixtures
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN:        ${{ secrets.PAT_TOKEN }}
        run: python fetch_data.py

  predict:
    if: github.event_name == 'schedule' && github.event.schedule == '0 15 * * *' || github.event.inputs.job == 'predict' || github.event.inputs.job == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions & send email
        env:
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
        run: python predict.py
