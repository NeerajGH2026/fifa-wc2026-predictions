name: Daily WC2026 Predictions

on:
  schedule:
    - cron: '30 10 * * *'   # 5:30 AM CDT = 10:30 UTC
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch scores & fixtures
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated predict.py
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add predict.py
          git diff --staged --quiet || git commit -m "Auto-update predict.py $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
