name: Daily WC2026 Predictions

on:
  schedule:
    - cron: '30 10 * * *'   # 5:30 AM CDT daily
  workflow_dispatch:          # manual trigger anytime

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run fetch_data.py
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push predict.py
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add predict.py
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Auto-update predict.py $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Keepalive touch
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          date -u >> .keepalive
          git add .keepalive
          git commit -m "keepalive $(date -u '+%Y-%m-%d')" || true
          git push || true
